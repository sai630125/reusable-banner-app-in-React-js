services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: afm-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "StrongPass!234"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-C", "-S", "localhost", "-U", "sa", "-P", "StrongPass!234", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - mssql-data:/var/opt/mssql

  mssql-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      mssql:
        condition: service_healthy
    volumes:
      - ./backend/database/init.sql:/scripts/init.sql:ro
    entrypoint: ["/bin/bash", "-c", "/opt/mssql-tools/bin/sqlcmd -S mssql -U sa -P 'StrongPass!234' -i /scripts/init.sql"]

volumes:
  mssql-data:
